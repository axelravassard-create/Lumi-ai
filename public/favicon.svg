<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="eye" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#a8f3ff"/>
      <stop offset="0.55" stop-color="#27e2ff"/>
      <stop offset="1" stop-color="#1aa8ff"/>
    </radialGradient>
  </defs>
  <!-- tuile arrondie (style icône d'app) -->
  <rect width="32" height="32" rx="9" fill="url(#g)"/>
  <!-- oreilles -->
  <ellipse cx="7" cy="17" rx="2.1" ry="2.9" fill="#fff"/>
  <ellipse cx="25" cy="17" rx="2.1" ry="2.9" fill="#fff"/>
  <!-- tête simplifiée de Lumi -->
  <path d="M16 5.2c4.7 0 8 3.4 8 8.4 0 5.6-3.3 9.6-8 9.6s-8-4-8-9.6c0-5 3.3-8.4 8-8.4Z" fill="#fff"/>
  <!-- yeux lumineux -->
  <circle cx="12.7" cy="14.2" r="2.15" fill="url(#eye)"/>
  <circle cx="19.3" cy="14.2" r="2.15" fill="url(#eye)"/>
  <!-- reflets de vie -->
  <circle cx="13.4" cy="13.5" r="0.7" fill="#fff"/>
  <circle cx="20" cy="13.5" r="0.7" fill="#fff"/>
</svg>
